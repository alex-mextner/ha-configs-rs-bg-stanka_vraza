# Replaces default_config (excludes cloud which needs subscription)
assist_pipeline:
bluetooth:
conversation:
dhcp:
energy:
file:
go2rtc:
history:
homeassistant_alerts:
logbook:
media_source:
mobile_app:
my:
ssdp:
stream:
sun:
usage_prediction:
usb:
webhook:
zeroconf:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

ingress:
  code_server:
    require_admin: true
    title: Code
    icon: mdi:code-braces
    url: http://code-server:8080
    work_mode: ingress
    ui_mode: toolbar
  esphome:
    require_admin: true
    title: ESPHome
    icon: mdi:chip
    url: http://esphome:6052
    work_mode: ingress
    ui_mode: toolbar

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

